<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <title>📊 Moyenne Générale</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4F72"/>
      <stop offset="100%" stop-color="#2980B9"/>
    </linearGradient>
  </defs>
  <circle cx="40" cy="40" r="38" fill="url(#bg)"/>
  <g transform="translate(16,16) scale(2)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Barres + ligne moyenne -->
      <rect x="3"  y="14" width="4" height="8" rx="1" fill="rgba(255,255,255,0.7)"/>
      <rect x="10" y="8"  width="4" height="14" rx="1" fill="white"/>
      <rect x="17" y="5"  width="4" height="17" rx="1" fill="rgba(255,255,255,0.85)"/>
      <line x1="2"  y1="22" x2="22" y2="22" stroke="white" stroke-width="1.5"/>
      <line x1="2"  y1="11" x2="22" y2="11" stroke="rgba(255,255,255,0.5)"
            stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>