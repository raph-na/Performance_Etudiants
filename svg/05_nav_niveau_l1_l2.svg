<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <title>🎓 Niveau L1 / L2</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4F72"/>
      <stop offset="100%" stop-color="#8E44AD"/>
    </linearGradient>
  </defs>
  <circle cx="40" cy="40" r="38" fill="url(#bg)"/>
  <g transform="translate(16,16) scale(2)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Toque + L1/L2 (même design toque mais couleur violette) -->
      <polygon points="12,2 22,7 12,12 2,7" fill="white"/>
      <path d="M6,7 L18,7 L18,14 Q12,18 6,14 Z"
            fill="rgba(255,255,255,0.4)" stroke="white" stroke-width="1.5"/>
      <line x1="22" y1="7" x2="22" y2="14" stroke="white" stroke-width="2"/>
      <circle cx="22" cy="15.5" r="1.8" fill="white"/>
      <!-- Badge L -->
      <circle cx="6" cy="18" r="3.5" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="1"/>
      <text x="6" y="20" font-size="4" fill="white" text-anchor="middle"
            font-family="Arial" font-weight="bold">L</text>
  </g>
</svg>